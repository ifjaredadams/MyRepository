<!DOCTYPE html>
<html lang="en">
<head>
    <title>TaskFlow Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>TaskFlow Manager</h1>

    <div class="form-container">
        <input type="text" id="taskName" placeholder="Enter task...">

        <select id="priority">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
        </select>

        <label>
            <input type="checkbox" id="important"> Important
        </label>

        <label>
            <input type="checkbox" id="completed"> Completed
        </label>

        <button onclick="addTask()">Add Task</button>
    </div>

    <h2>Your Tasks</h2>
    <div id="taskmanager"></div>

    <script src="script.js"></script>
</body>
</html>
